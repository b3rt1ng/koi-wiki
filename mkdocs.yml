site_name: Koi Documentation
site_url: https://b3rt1ng.github.io/koi-wiki/

theme:
  name: material
  logo: assets/images/logo.png
  favicon: assets/images/logo.png
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - content.code.copy

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Usage:
    - CLI Reference: cli-reference.md
    - Session Management: sessions.md
    - Payloads & Obfuscation: payloads.md
    - Upgrading Sessions: upgrading-sessions.md
    - Built-in Modules: modules.md
    - Logging & Review: logs.md
  - Module Development: make-your-modules.md
  - Future Updates: future-updates.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences

plugins:
  - search